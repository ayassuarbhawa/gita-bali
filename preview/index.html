<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Bhagawad Gita dalam Bahasa Indonesia dan Bahasa Bali.">
<title>Gītā Bali</title>
<style>
  :root {
    color-scheme: light;
    --ink: #27231e;
    --muted: #746c61;
    --paper: #f8f4eb;
    --surface: #fffdf8;
    --line: #ded6c7;
    --accent: #8a3d2f;
    --accent-dark: #642a21;
    --gold: #b68b3a;
    --shadow: 0 18px 45px rgba(65, 48, 31, .08);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 0, rgba(182, 139, 58, .11), transparent 28rem),
      var(--paper);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.7;
  }
  button, input { font: inherit; }
  button { color: inherit; }
  [hidden] { display: none !important; }

  .skip-link {
    position: fixed;
    z-index: 10;
    top: .75rem;
    left: .75rem;
    padding: .55rem .8rem;
    color: #fff;
    background: var(--accent-dark);
    transform: translateY(-200%);
  }
  .skip-link:focus { transform: translateY(0); }

  .site-header {
    border-bottom: 1px solid rgba(138, 61, 47, .18);
    background: rgba(248, 244, 235, .9);
    backdrop-filter: blur(12px);
  }
  .nav, main, .site-footer {
    width: min(100% - 2rem, 72rem);
    margin-inline: auto;
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 4.5rem;
  }
  .brand {
    color: var(--accent-dark);
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-decoration: none;
  }
  .nav-note {
    color: var(--muted);
    font: 600 .7rem/1.2 system-ui, sans-serif;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .hero {
    position: relative;
    padding: clamp(4rem, 9vw, 7.5rem) 0 clamp(3rem, 7vw, 5.5rem);
    text-align: center;
  }
  .hero::before {
    display: block;
    width: 3.25rem;
    height: 1px;
    margin: 0 auto 1.5rem;
    background: var(--gold);
    content: "";
  }
  .eyebrow {
    margin: 0 0 .75rem;
    color: var(--accent);
    font: 700 .72rem/1.3 system-ui, sans-serif;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  h1 {
    max-width: 15ch;
    margin: 0 auto;
    font-size: clamp(2.5rem, 7vw, 5.2rem);
    font-weight: 400;
    letter-spacing: -.035em;
    line-height: 1.05;
  }
  .sanskrit-title {
    min-height: 1.7em;
    margin: .8rem 0 0;
    color: var(--muted);
    font-size: clamp(1rem, 2vw, 1.25rem);
  }
  .chapter-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: .6rem 1.4rem;
    margin: 1.6rem 0 0;
    color: var(--muted);
    font: 600 .78rem/1.4 system-ui, sans-serif;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .reader-shell { padding-bottom: 5rem; }
  .toolbar {
    position: sticky;
    z-index: 5;
    top: 1rem;
    display: grid;
    grid-template-columns: auto minmax(12rem, 24rem);
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
    padding: .85rem;
    border: 1px solid rgba(222, 214, 199, .9);
    border-radius: 1rem;
    background: rgba(255, 253, 248, .92);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  .language-switch {
    display: flex;
    gap: .25rem;
    padding: .25rem;
    border-radius: .7rem;
    background: #eee7da;
  }
  .language-switch button {
    min-height: 2.6rem;
    padding: .45rem .9rem;
    border: 0;
    border-radius: .5rem;
    background: transparent;
    cursor: pointer;
    font: 700 .76rem/1 system-ui, sans-serif;
  }
  .language-switch button[aria-pressed="true"] {
    color: #fff;
    background: var(--accent);
  }
  .search {
    width: 100%;
    min-height: 3.1rem;
    padding: .65rem 1rem;
    border: 1px solid var(--line);
    border-radius: .7rem;
    color: var(--ink);
    background: var(--surface);
  }
  .search:focus, button:focus-visible, a:focus-visible {
    outline: 3px solid rgba(182, 139, 58, .42);
    outline-offset: 2px;
  }
  .result-meta {
    margin: -.6rem 0 1.4rem;
    color: var(--muted);
    font: .8rem/1.5 system-ui, sans-serif;
    text-align: right;
  }

  .sloka-list { display: grid; gap: 1rem; }
  .sloka {
    display: grid;
    grid-template-columns: 5rem minmax(0, 1fr);
    gap: clamp(1rem, 4vw, 3rem);
    padding: clamp(1.5rem, 4vw, 3rem);
    border: 1px solid var(--line);
    border-radius: 1rem;
    background: var(--surface);
    box-shadow: 0 7px 24px rgba(65, 48, 31, .045);
  }
  .sloka-number {
    color: var(--accent);
    font: 700 .72rem/1.4 system-ui, sans-serif;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .verse-body { min-width: 0; }
  .devanagari {
    margin: 0;
    font-size: clamp(1.25rem, 3vw, 1.7rem);
    line-height: 1.75;
    white-space: pre-line;
  }
  .iast {
    margin: .9rem 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    font-style: italic;
    white-space: pre-line;
  }
  .translation {
    margin: 1.4rem 0 0;
    padding-top: 1.4rem;
    border-top: 1px solid var(--line);
    font-size: clamp(1rem, 2vw, 1.16rem);
    white-space: pre-line;
  }
  .translation-label {
    display: block;
    margin-bottom: .5rem;
    color: var(--accent);
    font: 700 .68rem/1.4 system-ui, sans-serif;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .unavailable { color: var(--muted); font-style: italic; }

  .state-card {
    max-width: 40rem;
    margin: 0 auto 5rem;
    padding: clamp(2rem, 6vw, 4rem);
    border: 1px solid var(--line);
    border-radius: 1.25rem;
    background: var(--surface);
    box-shadow: var(--shadow);
    text-align: center;
  }
  .state-mark {
    display: grid;
    width: 4rem;
    height: 4rem;
    margin: 0 auto 1.5rem;
    place-items: center;
    border: 1px solid var(--gold);
    border-radius: 50%;
    color: var(--accent);
    font-size: 1.5rem;
  }
  .state-card h2 { margin: 0 0 .6rem; font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 400; }
  .state-card p { max-width: 31rem; margin: 0 auto; color: var(--muted); }
  .error-card { border-color: rgba(138, 61, 47, .45); }

  .sources {
    margin-top: 3rem;
    padding: 1.2rem 1.4rem;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font: .8rem/1.7 system-ui, sans-serif;
  }
  .sources h2 {
    margin: 0 0 .35rem;
    color: var(--ink);
    font-size: .8rem;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sources p { margin: .2rem 0; overflow-wrap: anywhere; }

  .site-footer {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.5rem 0 2.5rem;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font: .76rem/1.5 system-ui, sans-serif;
  }
  .site-footer a { color: var(--accent-dark); }

  @media (max-width: 42rem) {
    .nav-note { display: none; }
    .toolbar { position: static; grid-template-columns: 1fr; }
    .language-switch { display: grid; grid-template-columns: 1fr 1fr; }
    .sloka { grid-template-columns: 1fr; gap: .7rem; }
    .result-meta { text-align: left; }
    .site-footer { display: block; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<a class="skip-link" href="#content">Lewati ke isi</a>
<header class="site-header">
  <nav class="nav" aria-label="Navigasi utama">
    <a class="brand" href="./">GĪTĀ BALI</a>
    <span class="nav-note">Sanskrit · Indonesia · Bali</span>
  </nav>
</header>

<main id="content">
  <section class="hero" aria-labelledby="chapter-title">
    <p class="eyebrow" id="chapter-label">Bhagawad Gita</p>
    <h1 id="chapter-title">Memuat bab…</h1>
    <p class="sanskrit-title" id="sanskrit-title"></p>
    <p class="chapter-meta" id="chapter-meta"></p>
  </section>

  <section class="reader-shell" aria-label="Daftar sloka">
    <div class="toolbar" id="toolbar" hidden>
      <div class="language-switch" aria-label="Pilih bahasa terjemahan">
        <button type="button" data-language="id" aria-pressed="true">Indonesia</button>
        <button type="button" data-language="ban" aria-pressed="false">Bali</button>
      </div>
      <label>
        <span class="skip-link">Cari sloka</span>
        <input class="search" id="search" type="search" placeholder="Cari nomor atau isi sloka…" autocomplete="off">
      </label>
    </div>
    <p class="result-meta" id="result-meta" aria-live="polite" hidden></p>
    <div class="sloka-list" id="sloka-list"></div>
    <div id="state"></div>
    <section class="sources" id="sources" aria-labelledby="sources-title" hidden>
      <h2 id="sources-title">Sumber teks</h2>
      <div id="source-list"></div>
    </section>
  </section>
</main>

<footer class="site-footer">
  <span>Gītā Bali · Teks lintas bahasa untuk dibaca bersama.</span>
  <a href="#content">Kembali ke atas</a>
</footer>

<script>
(function () {
  "use strict";

  var state = { data: null, language: "id", query: "" };
  var list = document.getElementById("sloka-list");
  var stateBox = document.getElementById("state");
  var toolbar = document.getElementById("toolbar");
  var resultMeta = document.getElementById("result-meta");
  var search = document.getElementById("search");

  function filled(value) {
    return typeof value === "string" && value.trim().length > 0;
  }

  function make(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function readable(sloka) {
    return ["devanagari", "iast", "id", "ban"].some(function (field) {
      return filled(sloka[field]);
    });
  }

  function showState(title, message, isError) {
    stateBox.replaceChildren();
    var card = make("section", "state-card" + (isError ? " error-card" : ""));
    card.setAttribute("role", isError ? "alert" : "status");
    card.append(
      make("div", "state-mark", isError ? "!" : "ॐ"),
      make("h2", "", title),
      make("p", "", message)
    );
    stateBox.append(card);
  }

  function renderHeader(data) {
    var judul = data.judul || {};
    var mainTitle = filled(judul.id) ? judul.id : "Bab " + data.bab;
    document.getElementById("chapter-title").textContent = mainTitle;
    document.getElementById("sanskrit-title").textContent = filled(judul.sanskrit) ? judul.sanskrit : "";
    document.getElementById("chapter-label").textContent = "Bhagawad Gita · Bab " + data.bab;
    document.getElementById("chapter-meta").textContent = data.jumlah_sloka + " sloka";
    document.title = mainTitle + " — Gītā Bali";
  }

  function renderSources(data) {
    var labels = {
      sanskrit: "Sanskrit",
      terjemahan_id: "Terjemahan Indonesia",
      terjemahan_ban: "Terjemahan Bali"
    };
    var sourceData = data.sumber || {};
    var entries = Object.keys(labels).filter(function (key) { return filled(sourceData[key]); });
    var section = document.getElementById("sources");
    var sourceList = document.getElementById("source-list");
    sourceList.replaceChildren();
    section.hidden = entries.length === 0;
    entries.forEach(function (key) {
      sourceList.append(make("p", "", labels[key] + ": " + sourceData[key]));
    });
  }

  function matches(sloka, query) {
    if (!query) return true;
    return [sloka.no, sloka.devanagari, sloka.iast, sloka.id, sloka.ban]
      .some(function (value) { return String(value == null ? "" : value).toLocaleLowerCase("id").includes(query); });
  }

  function renderVerse(sloka) {
    var article = make("article", "sloka");
    article.id = "sloka-" + sloka.no;
    article.setAttribute("aria-labelledby", "sloka-label-" + sloka.no);

    var number = make("div", "sloka-number", "Sloka " + sloka.no);
    number.id = "sloka-label-" + sloka.no;
    var body = make("div", "verse-body");

    if (filled(sloka.devanagari)) body.append(make("p", "devanagari", sloka.devanagari));
    if (filled(sloka.iast)) body.append(make("p", "iast", sloka.iast));

    var translation = make("div", "translation");
    translation.append(make("span", "translation-label", state.language === "id" ? "Bahasa Indonesia" : "Basa Bali"));
    if (filled(sloka[state.language])) {
      translation.append(document.createTextNode(sloka[state.language]));
    } else {
      translation.append(make("span", "unavailable", state.language === "id"
        ? "Terjemahan Indonesia belum tersedia."
        : "Terjemahan Bali belum tersedia."));
    }
    body.append(translation);
    article.append(number, body);
    return article;
  }

  function renderList() {
    var readableVerses = state.data.sloka.filter(readable);
    var query = state.query.trim().toLocaleLowerCase("id");
    var filtered = readableVerses.filter(function (sloka) { return matches(sloka, query); });

    list.replaceChildren();
    stateBox.replaceChildren();

    if (readableVerses.length === 0) {
      toolbar.hidden = true;
      resultMeta.hidden = true;
      showState(
        "Bab ini sedang disiapkan",
        "Teks dan terjemahan belum tersedia. Silakan kembali saat proses penyusunan selesai.",
        false
      );
      return;
    }

    toolbar.hidden = false;
    resultMeta.hidden = false;
    resultMeta.textContent = filtered.length + " dari " + readableVerses.length + " sloka";

    if (filtered.length === 0) {
      showState("Sloka tidak ditemukan", "Coba kata kunci lain atau hapus pencarian.", false);
      return;
    }

    var fragment = document.createDocumentFragment();
    filtered.forEach(function (sloka) { fragment.append(renderVerse(sloka)); });
    list.append(fragment);
  }

  document.querySelectorAll("[data-language]").forEach(function (button) {
    button.addEventListener("click", function () {
      state.language = button.dataset.language;
      document.querySelectorAll("[data-language]").forEach(function (item) {
        item.setAttribute("aria-pressed", String(item === button));
      });
      renderList();
    });
  });

  search.addEventListener("input", function () {
    state.query = search.value;
    renderList();
  });

  fetch("../data/bab-02.json")
    .then(function (response) {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .then(function (data) {
      if (!data || typeof data !== "object" || !Array.isArray(data.sloka)) {
        throw new Error("Format data bab tidak valid");
      }
      state.data = data;
      renderHeader(data);
      renderSources(data);
      renderList();
    })
    .catch(function (error) {
      document.getElementById("chapter-title").textContent = "Data tidak dapat dimuat";
      document.getElementById("chapter-meta").textContent = "";
      toolbar.hidden = true;
      showState(
        "Gagal membuka bab",
        "Jalankan server dari root proyek, lalu muat ulang halaman. Detail: " + error.message,
        true
      );
    });
}());
</script>
</body>
</html>
